name: CI & Deploy

on:
  push:
    branches: ['**']

# Cancel an in-progress run if you push again to the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck, unit tests & E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright BDD)
        run: npm run test:e2e

      # Keeps the Playwright HTML report from a failed run for debugging.
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to Vercel (production)
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Verify Supabase secrets are present
        run: |
          test -n "${{ secrets.VITE_SUPABASE_URL }}" || { echo "::error::VITE_SUPABASE_URL secret is missing — add it in repo Settings → Secrets"; exit 1; }
          test -n "${{ secrets.VITE_SUPABASE_ANON_KEY }}" || { echo "::error::VITE_SUPABASE_ANON_KEY secret is missing — add it in repo Settings → Secrets"; exit 1; }

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Inject the real prod Supabase vars so Vite bakes them into the bundle.
      # This is independent of Vercel's stored env (which vercel pull can miss,
      # e.g. for Sensitive vars) — the build is now deterministic.
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # Safety net: never deploy a build that lost its Supabase config (which would
      # break auth and serve stale seed data). If the URL didn't bake in, fail here
      # so production stays on the last good deployment.
      - name: Guard against a misconfigured build
        run: |
          if ! grep -rq "supabase.co" .vercel/output; then
            echo "::error::Built bundle has no Supabase URL — refusing to deploy. Production left untouched."
            exit 1
          fi

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
